<div id="eventsFilterApp">

<style>

#eventsFilterApp{
font-family: Arial, sans-serif;
background:#f5f8fc;
padding:20px;
}

/* FILTER AREA */

#eventsFilterApp .filter-container{
margin-bottom:20px;
display:flex;
gap:20px;
flex-wrap:wrap;
align-items:center;
}

/* DROPDOWN */

#eventsFilterApp select{
padding:10px;
border:1px solid #ccc;
background:white;
border-radius:4px;
cursor:pointer;
min-width:180px;
font-size:14px;
}

/* TABLE */

#eventsFilterApp table{
border-collapse:collapse;
width:100%;
background:white;
}

#eventsFilterApp th{
background:#2576DA;
color:white;
padding:14px;
text-align:left;
}

#eventsFilterApp td{
padding:12px;
border-bottom:1px solid #e6eef9;
}

#eventsFilterApp tbody tr:nth-child(even){
background:#eef5ff;
}

</style>


<div class="filter-container">

<label>Location:</label>

<select id="locationFilter">
<option value="">All</option>
<option value="Virtual">Virtual</option>
<option value="In Person">In Person</option>
</select>

<label>Month:</label>

<select id="monthFilter">
<option value="">All Months</option>
<option value="0">January</option>
<option value="1">February</option>
<option value="2">March</option>
<option value="3">April</option>
<option value="4">May</option>
<option value="5">June</option>
<option value="6">July</option>
<option value="7">August</option>
<option value="8">September</option>
<option value="9">October</option>
<option value="10">November</option>
<option value="11">December</option>
</select>

</div>


<table id="myTable">

<thead>
<tr>
<th>Offering</th>
<th>Location</th>
<th>Date</th>
<th>Details</th>
<th>Registration</th>
</tr>
</thead>

<tbody></tbody>

</table>


<script src="https://cdn.jsdelivr.net/npm/papaparse@5.3.2/papaparse.min.js"></script>

<script>

window.addEventListener("load", function(){

const sheetURL =
"https://docs.google.com/spreadsheets/d/e/2PACX-1vTU81dHXm7z2zofzSveoAWzQBc-sm6cRYxcPxpUNwafw9PpeCwDH19UueLOSSCqayL6RgC_RegDMXnJ/pub?gid=0&single=true&output=csv";

let sheetData = [];

Papa.parse(sheetURL,{
download:true,
header:true,
complete:function(results){

sheetData = results.data.filter(row => row.Offering);
applyFilters();

}
});


function applyFilters(){

let location =
document.getElementById("locationFilter").value;

let month =
document.getElementById("monthFilter").value;

let filtered =
sheetData.filter(row=>{

let matchLocation = true;
let matchMonth = true;

if(location !== ""){
matchLocation = row.Location === location;
}

if(month !== ""){
let parts = row.Date.split("/");
let rowMonth = parseInt(parts[0]) - 1;
matchMonth = rowMonth == month;
}

return matchLocation && matchMonth;

});

renderTable(filtered);

}


function renderTable(data){

const tbody =
document.querySelector("#myTable tbody");

tbody.innerHTML="";

data.forEach(row=>{

let tr=document.createElement("tr");

tr.innerHTML=`
<td>${row.Offering}</td>
<td>${row.Location}</td>
<td>${row.Date}</td>
<td><a href="${row.Details}" target="_blank">Details</a></td>
<td><a href="${row.Registration}" target="_blank">Register</a></td>
`;

tbody.appendChild(tr);

});

}


document.getElementById("locationFilter").addEventListener("change",applyFilters);
document.getElementById("monthFilter").addEventListener("change",applyFilters);

});
</script>

</div>
