<div id="eventsFilterApp">

<style>

#eventsFilterApp{
font-family: Arial, sans-serif;
background:#f5f8fc;
padding:20px;
}

/* SCROLLING ANNOUNCEMENT BAR */

#eventsFilterApp .ticker-container{
width:100%;
overflow:hidden;
background:#2576DA;
color:white;
height:40px;
display:flex;
align-items:center;
margin-bottom:20px;
border-radius:4px;
}

#eventsFilterApp .ticker-text{
white-space:nowrap;
font-size:14px;
font-weight:500;
padding-left:70%;
animation: scrollText 14s linear forwards;
}

@keyframes scrollText{
0%{
transform:translateX(0);
}
100%{
transform:translateX(-200%);
}
}

/* FILTER AREA */

#eventsFilterApp .filter-container{
margin-bottom:20px;
display:flex;
gap:20px;
flex-wrap:wrap;
align-items:center;
}

/* DROPDOWN */

#eventsFilterApp select{
padding:10px;
border:1px solid #ccc;
background:white;
border-radius:4px;
cursor:pointer;
min-width:180px;
font-size:14px;
}

/* TABLE */

#eventsFilterApp table{
border-collapse:collapse;
width:100%;
background:white;
}

#eventsFilterApp th{
background:#2576DA;
color:white;
padding:14px;
text-align:left;
cursor:pointer;
user-select:none;
}

#eventsFilterApp td{
padding:12px;
border-bottom:1px solid #e6eef9;
}

#eventsFilterApp tbody tr:nth-child(even){
background:#eef5ff;
}

.sortArrow{
margin-left:6px;
font-size:12px;
}

</style>

<!-- SCROLLING MESSAGE -->

<div class="ticker-container">
<div class="ticker-text" id="tickerText">
All Summer Dates are from 10am - 12pm
</div>
</div>

<div class="filter-container">

<label>Location:</label>

<select id="locationFilter">
<option value="">All</option>
<option value="Virtual">Virtual</option>
<option value="In Person">In Person</option>
</select>

</div>

<table id="myTable">

<thead>
<tr>
<th>Offering</th>
<th>Location</th>
<th id="dateHeader">Date <span id="dateArrow" class="sortArrow">▲</span></th>
<th>Details</th>
<th>Registration</th>
</tr>
</thead>

<tbody></tbody>

</table>

<script src="https://cdn.jsdelivr.net/npm/papaparse@5.3.2/papaparse.min.js"></script>

<script>

window.addEventListener("load", function(){

/* SCROLLING TEXT */

const messages = [
"All Summer Dates are from 10am - 12pm",
"Registration Deadline for summer date: 7.31.2026",
"Registration Deadline for Winter Spring dates: 1.4.2027"
];

let msgIndex = 0;
const ticker = document.getElementById("tickerText");

function startScroll(){

ticker.style.animation = "none";
ticker.offsetHeight;

ticker.innerText = messages[msgIndex];

ticker.style.animation = "scrollText 7s linear forwards";

msgIndex = (msgIndex + 1) % messages.length;

}

startScroll();

ticker.addEventListener("animationend", startScroll);


/* TABLE DATA */

const sheetURL =
"https://docs.google.com/spreadsheets/d/e/2PACX-1vTU81dHXm7z2zofzSveoAWzQBc-sm6cRYxcPxpUNwafw9PpeCwDH19UueLOSSCqayL6RgC_RegDMXnJ/pub?gid=0&single=true&output=csv";

let sheetData = [];
let currentSort = "asc";

Papa.parse(sheetURL,{
download:true,
header:true,
complete:function(results){

sheetData = results.data.filter(row => row.Offering);
applyFilters();

}
});


function applyFilters(){

let location =
document.getElementById("locationFilter").value;

let filtered =
sheetData.filter(row=>{

let matchLocation = true;

if(location !== ""){
matchLocation = row.Location === location;
}

return matchLocation;

});

sortByDate(filtered);
renderTable(filtered);

}


function sortByDate(data){

data.sort(function(a,b){

let aParts = a.Date.split("/");
let bParts = b.Date.split("/");

let dateA = new Date(aParts[2], aParts[0]-1, aParts[1]);
let dateB = new Date(bParts[2], bParts[0]-1, bParts[1]);

if(currentSort === "asc"){
return dateA - dateB;
}else{
return dateB - dateA;
}

});

}


function renderTable(data){

const tbody =
document.querySelector("#myTable tbody");

tbody.innerHTML="";

data.forEach(row=>{

let tr=document.createElement("tr");

tr.innerHTML=`
<td>${row.Offering}</td>
<td>${row.Location}</td>
<td>${row.Date}</td>
<td><a href="${row.Details}" target="_blank">Details</a></td>
<td><a href="${row.Registration}" target="_blank">Register</a></td>
`;

tbody.appendChild(tr);

});

}


document.getElementById("locationFilter").addEventListener("change",applyFilters);


document.getElementById("dateHeader").addEventListener("click",function(){

currentSort = currentSort === "asc" ? "desc" : "asc";

document.getElementById("dateArrow").textContent =
currentSort === "asc" ? "▲" : "▼";

applyFilters();

});

});

</script>

</div>
